<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Quarterly sales by region</title>
  <desc id="desc">Grouped bar chart for North, South, and West sales from Q1 to Q4.</desc>
  <rect width="960" height="640" fill="#ffffff"/>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">Quarterly Sales by Region</text>
  <text x="480" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#586174">Values in millions</text>

  <line x1="110" y1="510" x2="890" y2="510" stroke="#263247" stroke-width="2"/>
  <line x1="110" y1="110" x2="110" y2="510" stroke="#263247" stroke-width="2"/>

  <g font-family="Arial, sans-serif" font-size="15" fill="#586174" text-anchor="end">
    <text x="98" y="515">0</text>
    <text x="98" y="435">10</text>
    <text x="98" y="355">20</text>
    <text x="98" y="275">30</text>
    <text x="98" y="195">40</text>
    <text x="98" y="115">50</text>
  </g>
  <g stroke="#d9deea" stroke-width="1">
    <line x1="110" y1="430" x2="890" y2="430"/>
    <line x1="110" y1="350" x2="890" y2="350"/>
    <line x1="110" y1="270" x2="890" y2="270"/>
    <line x1="110" y1="190" x2="890" y2="190"/>
    <line x1="110" y1="110" x2="890" y2="110"/>
  </g>

  <g>
    <rect x="155" y="350" width="42" height="160" fill="#3478c7"/><rect x="199" y="382" width="42" height="128" fill="#e97832"/><rect x="243" y="406" width="42" height="104" fill="#41a36f"/>
    <rect x="345" y="310" width="42" height="200" fill="#3478c7"/><rect x="389" y="334" width="42" height="176" fill="#e97832"/><rect x="433" y="366" width="42" height="144" fill="#41a36f"/>
    <rect x="535" y="254" width="42" height="256" fill="#3478c7"/><rect x="579" y="286" width="42" height="224" fill="#e97832"/><rect x="623" y="326" width="42" height="184" fill="#41a36f"/>
    <rect x="725" y="190" width="42" height="320" fill="#3478c7"/><rect x="769" y="238" width="42" height="272" fill="#e97832"/><rect x="813" y="270" width="42" height="240" fill="#41a36f"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="15" fill="#172033" text-anchor="middle">
    <text x="176" y="342">20</text><text x="220" y="374">16</text><text x="264" y="398">13</text>
    <text x="366" y="302">25</text><text x="410" y="326">22</text><text x="454" y="358">18</text>
    <text x="556" y="246">32</text><text x="600" y="278">28</text><text x="644" y="318">23</text>
    <text x="746" y="182">40</text><text x="790" y="230">34</text><text x="834" y="262">30</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="18" fill="#172033" text-anchor="middle">
    <text x="220" y="545">Q1</text><text x="410" y="545">Q2</text><text x="600" y="545">Q3</text><text x="790" y="545">Q4</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="16" fill="#172033">
    <rect x="300" y="580" width="20" height="20" rx="2" fill="#3478c7"/><text x="330" y="596">North</text>
    <rect x="430" y="580" width="20" height="20" rx="2" fill="#e97832"/><text x="460" y="596">South</text>
    <rect x="560" y="580" width="20" height="20" rx="2" fill="#41a36f"/><text x="590" y="596">West</text>
  </g>
</svg>
